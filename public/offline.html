<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>التطبيق بلا إنترنت</title>
    <style>
      html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arabic Typesetting, sans-serif; background: #0f172a; color: #fff; }
      .wrap { display: grid; place-items: center; height: 100%; padding: 24px; }
      .card { max-width: 520px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18); border-radius: 16px; padding: 24px; box-shadow: 0 16px 40px rgba(0,0,0,0.35); }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { font-size: 14px; opacity: 0.9; }
      .btn { margin-top: 12px; display: inline-block; padding: 10px 14px; background: #2563eb; color: #fff; border-radius: 10px; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>لا يوجد اتصال بالإنترنت</h1>
        <p>يمكنك تصفح الواجهات التي فُتحت سابقًا دون اتصال. عند عودة الشبكة اضغط إعادة التحميل.</p>
        <a class="btn" href="/" rel="nofollow">إعادة التحميل</a>
      </div>
    </div>
  </body>
  </html>
